server {
    listen 80;
    server_name _;

    # Frontend — serve the built React app
    root /home/ubuntu/gromo-ai-trainer/frontend/dist;
    index index.html;

    # API requests — proxy to Python backend
    location /api/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
        proxy_connect_timeout 60s;
        client_max_body_size 50M;
    }

    # Storage — serve generated videos/files
    location /storage/ {
        alias /home/ubuntu/gromo-ai-trainer/backend/storage/;
        autoindex off;
    }

    # Frontend SPA — all non-API routes go to index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Gzip compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript;
    gzip_min_length 1000;
}
