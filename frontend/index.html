<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="format-detection" content="telephone=no" />
    <meta name="theme-color" content="#2563eb" />

    <!-- Open Graph tags for better link previews in WhatsApp/Instagram/etc -->
    <meta property="og:title" content="GroMo AI Trainer" />
    <meta property="og:description" content="AI-Powered Training Platform for GroMo Partners" />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="/vite.svg" />

    <title>GroMo AI Trainer</title>
    <script src="https://accounts.google.com/gsi/client" async defer></script>

    <!-- Handle in-app browser redirect -->
    <script>
      (function() {
        var ua = navigator.userAgent || navigator.vendor || window.opera;
        // Detect common in-app browsers
        var isInApp = /FBAN|FBAV|Instagram|Line|WhatsApp|Snapchat|Twitter|LinkedInApp/i.test(ua);
        if (isInApp) {
          // For Android: try intent to open in Chrome
          var isAndroid = /Android/i.test(ua);
          var isIOS = /iPhone|iPad|iPod/i.test(ua);

          if (isAndroid) {
            // Show a banner to open in external browser
            document.addEventListener('DOMContentLoaded', function() {
              var banner = document.createElement('div');
              banner.id = 'open-browser-banner';
              banner.style.cssText = 'position:fixed;top:0;left:0;right:0;z-index:99999;background:#2563eb;color:white;padding:12px 16px;text-align:center;font-family:sans-serif;font-size:14px;display:flex;align-items:center;justify-content:center;gap:8px;';
              banner.innerHTML = '<span>For best experience, open in your browser</span><a href="intent://' + location.host + location.pathname + location.search + '#Intent;scheme=https;package=com.android.chrome;end" style="background:white;color:#2563eb;padding:4px 12px;border-radius:6px;text-decoration:none;font-weight:600;font-size:13px;">Open</a><button onclick="this.parentElement.remove()" style="background:none;border:none;color:white;font-size:18px;cursor:pointer;padding:0 4px;">&times;</button>';
              document.body.prepend(banner);
            });
          } else if (isIOS) {
            // iOS in-app browsers - show copy link banner
            document.addEventListener('DOMContentLoaded', function() {
              var banner = document.createElement('div');
              banner.id = 'open-browser-banner';
              banner.style.cssText = 'position:fixed;top:0;left:0;right:0;z-index:99999;background:#2563eb;color:white;padding:12px 16px;text-align:center;font-family:sans-serif;font-size:14px;display:flex;align-items:center;justify-content:center;gap:8px;';
              banner.innerHTML = '<span>Open in Safari for best experience</span><button onclick="navigator.clipboard.writeText(window.location.href).then(function(){this.textContent=\'Copied!\'}.bind(this))" style="background:white;color:#2563eb;padding:4px 12px;border-radius:6px;border:none;font-weight:600;font-size:13px;cursor:pointer;">Copy Link</button><button onclick="this.parentElement.remove()" style="background:none;border:none;color:white;font-size:18px;cursor:pointer;padding:0 4px;">&times;</button>';
              document.body.prepend(banner);
            });
          }
        }
      })();
    </script>
  </head>
  <body class="bg-gray-50">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
